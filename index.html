<style>
:root {
  --bg: oklch(0.13 0.012 260);
  --bg-2: oklch(0.10 0.015 265);
  --ink: oklch(0.97 0.005 250);
  --ink-dim: oklch(0.72 0.01 250);
  --ink-mute: oklch(0.52 0.012 250);
  --line: oklch(1 0 0 / 0.08);
  --line-strong: oklch(1 0 0 / 0.14);
  --glass: oklch(1 0 0 / 0.04);
  --glass-2: oklch(1 0 0 / 0.07);
  --accent: oklch(0.70 0.19 245);
  --accent-2: oklch(0.62 0.22 295);
  --accent-3: oklch(0.88 0.13 210);
  --accent-ink: oklch(0.18 0.04 260);
  --radius-sm: 10px;
  --radius: 18px;
  --radius-lg: 28px;
  --radius-xl: 40px;
  --display: "Geist", "Geist Sans", ui-sans-serif, system-ui, sans-serif;
  --serif: "Instrument Serif", "Cormorant Garamond", Georgia, serif;
  --mono: "Geist Mono", ui-monospace, "SF Mono", monospace;
  --container: 1280px;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
section[id], [id="top"] { scroll-margin-top: 96px; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--display);
  font-weight: 400;
  font-feature-settings: "ss01", "cv11";
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
  letter-spacing: -0.01em;
}
::selection { background: var(--accent); color: var(--accent-ink); }
img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }

.container {
  width: 100%;
  max-width: var(--container);
  margin: 0 auto;
  padding: 0 32px;
}
.eyebrow {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-mute);
  display: inline-flex;
  align-items: center;
  gap: 12px;
}
.eyebrow::before {
  content: "";
  width: 34px; height: 10px;
  background-image:
    radial-gradient(circle at 5px 50%, var(--accent-3) 0 1.4px, transparent 1.8px),
    radial-gradient(circle at 5px 50%, transparent 0 3px, var(--ink-mute) 3.1px, var(--ink-mute) 4px, transparent 4.1px),
    linear-gradient(90deg, transparent 0 12px, var(--ink-mute) 12px, var(--ink-mute) 100%);
  background-size: 100% 100%, 100% 100%, 100% 1px;
  background-repeat: no-repeat;
  background-position: left center, left center, left center;
  flex-shrink: 0;
}
.italic { font-family: var(--serif); font-style: italic; font-weight: 400; letter-spacing: -0.02em; }
h1, h2, h3, h4 {
  font-family: var(--display);
  font-weight: 600;
  letter-spacing: -0.035em;
  margin: 0;
  line-height: 0.95;
  text-wrap: balance;
}
p { margin: 0; line-height: 1.55; text-wrap: pretty; color: var(--ink-dim); }

.grain {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 1;
  opacity: 0.5;
  mix-blend-mode: overlay;
  background-image: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPScyMDAnIGhlaWdodD0nMjAwJz48ZmlsdGVyIGlkPSduJz48ZmVUdXJidWxlbmNlIHR5cGU9J2ZyYWN0YWxOb2lzZScgYmFzZUZyZXF1ZW5jeT0nMC45JyBudW1PY3RhdmVzPScyJyBzZWVkPSczJy8+PGZlQ29sb3JNYXRyaXggdmFsdWVzPScwIDAgMCAwIDEgMCAwIDAgMCAxIDAgMCAwIDAgMSAwIDAgMCAwLjE4IDAnLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0nMjAwJyBoZWlnaHQ9JzIwMCcgZmlsdGVyPSd1cmwoJTIzbiknLz48L3N2Zz4=");
}

.btn {
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 16px 26px;
  border-radius: 999px;
  font-weight: 500;
  font-size: 15px;
  letter-spacing: -0.01em;
  white-space: nowrap;
  transition: transform .35s cubic-bezier(.2,.7,.2,1), background .3s, color .3s, box-shadow .35s;
}
.btn .arr {
  display: inline-flex;
  width: 26px; height: 26px;
  border-radius: 999px;
  background: currentColor;
  color: var(--accent-ink);
  align-items: center; justify-content: center;
  transition: transform .35s cubic-bezier(.2,.7,.2,1);
}
.btn .arr svg { width: 12px; height: 12px; }
.btn:hover .arr { transform: translateX(2px) rotate(-45deg); }
.btn-primary {
  background: var(--accent);
  color: var(--accent-ink);
  box-shadow: 0 10px 40px -10px oklch(0.7 0.19 245 / 0.5), 0 0 0 1px oklch(1 0 0 / 0.06) inset;
}
.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 16px 50px -10px oklch(0.7 0.19 245 / 0.7), 0 0 0 1px oklch(1 0 0 / 0.1) inset;
}
.btn-ghost {
  background: var(--glass);
  color: var(--ink);
  border: 1px solid var(--line);
  backdrop-filter: blur(20px);
}
.btn-ghost:hover { background: var(--glass-2); border-color: var(--line-strong); }
.btn-ghost .arr { background: var(--ink); color: var(--bg); }

.nav-wrap {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 50;
  padding: 18px 0;
  transition: padding .3s, background .3s, backdrop-filter .3s;
}
.nav-wrap.scrolled { padding: 12px 0; background: oklch(0.12 0.012 260 / 0.7); backdrop-filter: blur(20px) saturate(140%); border-bottom: 1px solid var(--line); }
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
}
.brand {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-weight: 500;
  letter-spacing: -0.02em;
  font-size: 17px;
}
.brand-mark {
  width: 50px;
  height: auto;
  display: block;
  flex-shrink: 0;
  filter: drop-shadow(0 0 10px oklch(0.70 0.19 245 / 0.35));
  transition: filter .5s ease, transform .5s ease;
}
.brand:hover .brand-mark {
  filter: drop-shadow(0 0 14px oklch(0.70 0.19 245 / 0.6));
  transform: translateY(-0.5px);
}
.brand b { font-weight: 600; }
.brand span.dot { color: var(--accent); }
.nav-links {
  display: flex;
  gap: 6px;
  padding: 6px;
  background: var(--glass);
  border: 1px solid var(--line);
  border-radius: 999px;
  backdrop-filter: blur(18px);
}
.nav-links a {
  padding: 9px 18px;
  border-radius: 999px;
  font-size: 14px;
  color: var(--ink-dim);
  transition: color .2s, background .2s;
  position: relative;
}
.nav-links a:hover { color: var(--ink); background: var(--glass-2); }
.nav-cta { display: flex; gap: 10px; align-items: center; }
.nav-cta .btn { padding: 11px 18px; font-size: 14px; }
.nav-cta .btn .arr { width: 22px; height: 22px; }
@media (max-width: 860px) { .nav-links { display: none; } }

.hero {
  position: relative;
  min-height: 100vh;
  padding: 140px 0 80px;
  overflow: hidden;
  isolation: isolate;
}
.hero-bg {
  position: absolute; inset: 0;
  z-index: -1;
  overflow: hidden;
}
.hero-bg::before {
  content: "";
  position: absolute; inset: 0;
  background:
    radial-gradient(60% 60% at 70% 30%, oklch(0.62 0.22 295 / 0.35), transparent 65%),
    radial-gradient(70% 55% at 15% 75%, oklch(0.70 0.19 245 / 0.4), transparent 65%),
    radial-gradient(40% 50% at 85% 85%, oklch(0.88 0.13 210 / 0.18), transparent 65%);
  filter: blur(20px);
  animation: drift 22s ease-in-out infinite alternate;
}
.hero-bg::after {
  content: "";
  position: absolute; inset: 0;
  background-image:
    linear-gradient(to right, oklch(1 0 0 / 0.04) 1px, transparent 1px),
    linear-gradient(to bottom, oklch(1 0 0 / 0.04) 1px, transparent 1px);
  background-size: 64px 64px;
  mask-image: radial-gradient(ellipse at 50% 30%, black 30%, transparent 75%);
}
@keyframes drift {
  0% { transform: translate(0,0) scale(1); }
  50% { transform: translate(-3%, 2%) scale(1.05); }
  100% { transform: translate(2%, -1%) scale(1.02); }
}
.hero-inner { position: relative; z-index: 2; }

.hero-lens {
  position: absolute;
  top: 8%;
  right: -16%;
  width: clamp(520px, 56vw, 880px);
  aspect-ratio: 1;
  pointer-events: none;
  z-index: 0;
  opacity: 0.85;
  filter: drop-shadow(0 0 60px oklch(0.70 0.19 245 / 0.18));
  animation: lensDrift 38s linear infinite;
  mix-blend-mode: screen;
}
.hero-lens svg { width: 100%; height: 100%; display: block; }
@keyframes lensDrift {
  0%   { transform: translateY(0) rotate(0deg); }
  50%  { transform: translateY(-14px) rotate(180deg); }
  100% { transform: translateY(0) rotate(360deg); }
}
@media (max-width: 1024px) { .hero-lens { top: 56%; right: -28%; width: 560px; opacity: 0.55; } }
@media (max-width: 640px) { .hero-lens { display: none; } }

.lens-glyph {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 22px;
  border-radius: 999px;
  background: oklch(0.70 0.19 245 / 0.12);
  border: 1px solid oklch(0.70 0.19 245 / 0.35);
  color: var(--accent-3);
  filter: drop-shadow(0 0 8px oklch(0.70 0.19 245 / 0.5));
}
.lens-glyph svg { width: 22px; height: 10px; }

.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 8px 16px 8px 8px;
  border-radius: 999px;
  background: var(--glass);
  border: 1px solid var(--line);
  backdrop-filter: blur(18px);
  font-size: 13px;
  color: var(--ink-dim);
  margin-bottom: 32px;
}
.hero-title {
  font-size: clamp(56px, 9vw, 144px);
  line-height: 0.92;
  letter-spacing: -0.045em;
  margin: 0;
  max-width: 1100px;
}
.hero-title .italic { font-size: 1.02em; line-height: 0.9; }
.hero-title .underline-word {
  position: relative;
  display: inline-block;
}
.hero-title .underline-word::after {
  content: "";
  position: absolute;
  left: 0; right: 0; bottom: 0.04em;
  height: 0.08em;
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
  border-radius: 999px;
  transform-origin: left;
  animation: drawIn 1.2s .4s cubic-bezier(.2,.7,.2,1) both;
}
@keyframes drawIn { from { transform: scaleX(0); } to { transform: scaleX(1); } }
.hero-sub {
  max-width: 560px;
  font-size: 18px;
  color: var(--ink-dim);
  margin-top: 36px;
  line-height: 1.5;
}
.hero-actions { display: flex; gap: 14px; margin-top: 40px; flex-wrap: wrap; }
.hero-grid {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 60px;
  align-items: end;
}
@media (max-width: 1024px) { .hero-grid { grid-template-columns: 1fr; } }

.hero-cards {
  position: relative;
  height: 540px;
}
.fcard {
  position: absolute;
  border-radius: 22px;
  background: linear-gradient(160deg, oklch(1 0 0 / 0.06), oklch(1 0 0 / 0.02));
  border: 1px solid var(--line);
  backdrop-filter: blur(28px) saturate(160%);
  padding: 18px;
  box-shadow: 0 30px 60px -30px oklch(0 0 0 / 0.6), inset 0 1px 0 oklch(1 0 0 / 0.06);
  animation: float 8s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0) rotate(var(--rot,0deg)); }
  50% { transform: translateY(-14px) rotate(var(--rot,0deg)); }
}
.fcard.metric { top: 0; right: 0; width: 230px; --rot: 3deg; animation-delay: -1s; }
.fcard.review { top: 130px; left: 0; width: 280px; --rot: -3deg; animation-delay: -3s; }
.fcard.preview { bottom: 0; right: 30px; width: 320px; --rot: 1.5deg; animation-delay: -5s; padding: 0; overflow: hidden; }
.fcard .label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.16em; color: var(--ink-mute); }
.fcard .big { font-size: 36px; font-weight: 600; letter-spacing: -0.04em; margin-top: 4px; line-height: 1; }
.fcard .row { display: flex; align-items: center; justify-content: space-between; }
.fcard .delta { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: oklch(0.85 0.16 145); margin-top: 8px; }
.fcard .sparkline { margin-top: 12px; height: 36px; width: 100%; }
.fcard.review {
  display: flex; flex-direction: column; gap: 14px;
  background: linear-gradient(160deg, oklch(1 0 0 / 0.07), oklch(1 0 0 / 0.015));
  padding: 22px 22px 20px;
}
.fcard.review .qbody {
  margin: 0;
  font-family: var(--display);
  font-weight: 500;
  font-size: 17px;
  line-height: 1.3;
  letter-spacing: -0.015em;
  color: var(--ink);
}
.fcard.review .qbody em {
  font-family: var(--serif);
  font-style: italic;
  color: var(--accent-3);
  font-weight: 400;
}
.fcard.review .who {
  display: flex; align-items: center; gap: 10px;
  padding-top: 14px;
  border-top: 1px solid var(--line);
}
.fcard.review .avatar-pair {
  position: relative;
  width: 36px; height: 22px;
  flex-shrink: 0;
}
.fcard.review .ava {
  position: absolute;
  top: 0;
  width: 22px; height: 22px;
  border-radius: 999px;
  border: 1.5px solid oklch(0.10 0.012 260);
  background-size: cover;
  background-position: center 22%;
  background-repeat: no-repeat;
  background-color: oklch(0.20 0.012 260);
  filter: saturate(0.92) contrast(1.02);
  box-shadow: 0 1px 3px oklch(0 0 0 / 0.4);
}
.fcard.review .ava-v { left: 0; z-index: 2; }
.fcard.review .ava-a { left: 14px; z-index: 1; }
.fcard.review .name { font-size: 12px; line-height: 1.25; }
.fcard.review .name b { display: block; font-weight: 500; color: var(--ink); }
.fcard.review .name span { color: var(--ink-mute); font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; }
.fcard.preview .pheader { display: flex; gap: 4px; padding: 10px 14px; border-bottom: 1px solid var(--line); }
.fcard.preview .pheader span { width: 8px; height: 8px; border-radius: 999px; background: var(--line-strong); }
.fcard.preview .pheader span:first-child { background: oklch(0.74 0.18 30); }
.fcard.preview .pheader span:nth-child(2) { background: oklch(0.84 0.14 90); }
.fcard.preview .pheader span:nth-child(3) { background: oklch(0.78 0.16 145); }
.fcard.preview .pbody { padding: 14px; background: oklch(0.10 0.012 260); }
.fcard.preview .pbody .h { height: 10px; width: 70%; background: oklch(1 0 0 / 0.18); border-radius: 4px; }
.fcard.preview .pbody .l { height: 6px; background: oklch(1 0 0 / 0.08); border-radius: 4px; margin-top: 10px; }
.fcard.preview .pbody .l.s { width: 50%; }
.fcard.preview .pbody .img {
  margin-top: 14px;
  height: 110px;
  border-radius: 10px;
  background:
    radial-gradient(60% 80% at 30% 30%, var(--accent), transparent 60%),
    radial-gradient(80% 80% at 80% 70%, var(--accent-2), transparent 60%),
    var(--bg-2);
  position: relative;
  overflow: hidden;
}
.fcard.preview .pbody .img::after {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(120deg, transparent 30%, oklch(1 0 0 / 0.12) 50%, transparent 70%);
  animation: shimmer 3s linear infinite;
}
@keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(100%); } }

.refraction-strip {
  margin-top: 60px;
  height: 1px;
  background: linear-gradient(90deg,
    transparent 0%,
    oklch(0.88 0.13 210 / 0.6) 18%,
    oklch(0.70 0.19 245 / 0.9) 38%,
    oklch(0.62 0.22 295 / 0.85) 58%,
    oklch(0.74 0.18 30 / 0.5) 78%,
    transparent 100%);
  filter: blur(0.4px);
  position: relative;
}
.refraction-strip::before, .refraction-strip::after {
  content: "";
  position: absolute;
  top: 50%;
  width: 6px; height: 6px;
  border-radius: 999px;
  transform: translateY(-50%);
  background: oklch(1 0 0 / 0.9);
  box-shadow: 0 0 10px oklch(0.70 0.19 245);
}
.refraction-strip::before { left: 18%; }
.refraction-strip::after  { right: 22%; background: oklch(0.88 0.13 210 / 0.9); box-shadow: 0 0 10px oklch(0.88 0.13 210); }

.focus-ring {
  position: absolute;
  pointer-events: none;
  z-index: 0;
  opacity: 0.55;
  mix-blend-mode: screen;
}
.focus-ring svg { width: 100%; height: 100%; display: block; }
.focus-ring-trust {
  top: -40px; right: -60px;
  width: 360px; aspect-ratio: 1;
  animation: lensDrift 60s linear infinite reverse;
}

.marquee {
  margin-top: 80px;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  overflow: hidden;
  padding: 24px 0;
}
.marquee-track {
  display: flex; gap: 60px;
  animation: scroll 36s linear infinite;
  white-space: nowrap;
  align-items: center;
}
.marquee-track span {
  font-family: var(--serif);
  font-style: italic;
  font-size: 28px;
  color: var(--ink-dim);
  display: inline-flex; align-items: center; gap: 60px;
}
.marquee-track span::after {
  content: "✦";
  font-family: var(--display);
  font-style: normal;
  color: var(--accent);
  font-size: 20px;
}
@keyframes scroll { to { transform: translateX(-50%); } }

.section {
  position: relative;
  padding: 140px 0;
}
.section-head {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: end;
  margin-bottom: 64px;
}
@media (max-width: 860px) {
  .section-head { grid-template-columns: 1fr; gap: 24px; }
  .section { padding: 96px 0; }
}
.section-title {
  font-size: clamp(42px, 5.5vw, 84px);
  line-height: 0.95;
  letter-spacing: -0.04em;
  margin-top: 18px;
  max-width: 14ch;
}
.section-lede {
  font-size: 17px;
  max-width: 460px;
  color: var(--ink-dim);
}

.trust {
  background:
    radial-gradient(60% 60% at 80% 0%, oklch(0.62 0.22 295 / 0.10), transparent 70%),
    radial-gradient(60% 60% at 0% 100%, oklch(0.70 0.19 245 / 0.10), transparent 70%);
}
.trust-grid {
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 50px;
  align-items: stretch;
}
@media (max-width: 980px) { .trust-grid { grid-template-columns: 1fr; } }
.trust-card {
  position: relative;
  padding: 48px;
  border-radius: var(--radius-lg);
  background: linear-gradient(160deg, oklch(1 0 0 / 0.05), oklch(1 0 0 / 0.015));
  border: 1px solid var(--line);
  backdrop-filter: blur(20px);
  overflow: hidden;
}
.trust-card.dark {
  background: linear-gradient(160deg, oklch(0.18 0.02 265), oklch(0.10 0.012 260));
}
.trust-card .quote {
  font-family: var(--display);
  font-size: clamp(28px, 3.2vw, 42px);
  line-height: 1.1;
  letter-spacing: -0.02em;
  color: var(--ink);
}
.trust-card .quote em { font-family: var(--serif); font-style: italic; color: var(--accent-3); font-weight: 400; }
.trust-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--line); border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--line); }
.tstat { padding: 36px 28px; background: var(--bg); }
.tstat:nth-child(1), .tstat:nth-child(2) { background: oklch(0.14 0.012 262); }
.tstat:nth-child(3), .tstat:nth-child(4) { background: oklch(0.13 0.012 262); }
.tstat .num { font-size: clamp(44px, 5vw, 64px); font-weight: 600; letter-spacing: -0.04em; line-height: 1; background: linear-gradient(180deg, var(--ink), var(--ink-dim)); -webkit-background-clip: text; background-clip: text; color: transparent; }
.tstat .num sup { font-size: 0.45em; font-weight: 500; vertical-align: top; color: var(--accent); margin-left: 4px; }
.tstat .lbl { margin-top: 10px; font-size: 13px; color: var(--ink-dim); }

.services-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 18px;
}
@media (max-width: 640px) { .services-grid { grid-template-columns: 1fr; } }
.scard {
  position: relative;
  padding: 40px 38px 42px;

  .tstat { padding: 26px 20px; }
  .tstat .num { font-size: clamp(38px, 12vw, 52px); }
  .tstat .lbl { font-size: 12px; }

  /* services */
  .scard { padding: 28px 26px 30px; min-height: 0; }
  .scard h3 { font-size: 26px; margin-top: 18px; }
  .scard p { font-size: 14.5px; margin-top: 18px; }
  .scard .icn { margin-bottom: 14px; }

  /* about */
  .founder { padding: 22px; }
  .founder h3 { font-size: 28px; }
  .founder p { font-size: 14px; margin-top: 14px; }
  .about-foot-card { padding: 26px 22px; }
  .pair-list li { font-size: 14px; padding: 10px 0; }

  /* booking */
  .book-info { padding: 32px 24px; }
  .book-info h3 { font-size: 30px; }
  .book-info p { font-size: 14px; }
  .book-cal { padding: 0; border-top: 0; }

  /* contact / form (≥16px font-size prevents iOS focus-zoom) */
  .form-card { padding: 26px 22px; }
  .field { margin-bottom: 16px; }
  .field input, .field textarea, .field select {
    font-size: 16px;
    padding: 13px 14px;
    border-radius: 10px;
  }
  .field textarea { min-height: 120px; }
  .chip { padding: 10px 14px; font-size: 12px; }
  .cside { padding: 20px; gap: 14px; }
  .cside .icn { width: 40px; height: 40px; }
  .cside.glow { padding: 24px; }
  .cside.glow h4 { font-size: 20px; }
  .form-msg { padding: 12px 14px; }

  /* final cta */
  .final { padding: 140px 0; }
  .final p { font-size: 16px; margin-top: 24px; }
  .final .actions { flex-direction: column; align-items: stretch; gap: 10px; }
  .final .actions .btn { width: 100%; justify-content: space-between; padding: 16px 22px; }

  /* footer */
  .foot { padding: 56px 0 28px; }
  .foot-grid { gap: 32px; }
  .foot-brand p { font-size: 13px; }
}

@media (max-width: 480px) {
  .foot-grid { grid-template-columns: 1fr; gap: 28px; }
  .foot-bottom { flex-direction: column; gap: 8px; text-align: center; margin-top: 40px; }
  .hero-eyebrow span:last-child { font-size: 11.5px; line-height: 1.4; }
}
</style>

const { useState, useEffect, useRef, useMemo, useCallback } = React;

function useTweaks(defaults) {
  const [values, setValues] = useState(defaults);
  const setTweak = useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = useState(false);
  const dragRef = useRef(null);
  const offsetRef = useRef({ x: 16, y: 16 });

  useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd">
          <b>{title}</b>
          <button className="twk-x" onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ title, label, children }) {
  return (<><div className="twk-sect">{title || label}</div>{children}</>);
}
function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl"><span>{label}</span>{value != null && <span className="twk-val">{value}</span>}</div>
      {children}
    </div>
  );
}
function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}
function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}
function TweakRadio({ label, value, options, onChange }) {
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const trackRef = useRef(null);
  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const i = Math.floor(((clientX - r.left - 2) / (r.width - 4)) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };
  const onPointerDown = (e) => {
    onChange(segAt(e.clientX));
    const move = (ev) => onChange(segAt(ev.clientX));
    const up = () => { window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <TweakRow label={label}>
      <div ref={trackRef} className="twk-seg" onPointerDown={onPointerDown}>
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => <button key={o.value} type="button">{o.label}</button>)}
      </div>
    </TweakRow>
  );
}
function TweakColor({ label, value, options, onChange }) {
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" data-on={on ? '1' : '0'}
                    style={{ background: hero }} onClick={() => onChange(o)}>
              {sup.length > 0 && <span>{sup.map((c, j) => <i key={j} style={{ background: c }} />)}</span>}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}
</script>

function Booking() {
  const widgetRef = useRef(null);
  const [calStep, setCalStep] = useState('initial');

  useEffect(() => {
    const el = widgetRef.current;
    if (!el) return undefined;

    const init = () => {
      if (!el || el.querySelector('iframe')) return; // already initialized
      if (window.Calendly && typeof window.Calendly.initInlineWidget === 'function') {
        window.Calendly.initInlineWidget({ url: CALENDLY_URL, parentElement: el });
      }
    };

    const onMessage = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      const event = e.data.event;
      if (typeof event !== 'string' || !event.startsWith('calendly.')) return;
      if (event === 'calendly.event_scheduled') setCalStep('scheduled');
      else if (event === 'calendly.date_and_time_selected') setCalStep('form');
      else if (event === 'calendly.event_type_viewed' || event === 'calendly.profile_page_viewed') setCalStep('initial');
    };
    window.addEventListener('message', onMessage);

    let interval;
    if (window.Calendly) {
      init();
    } else {
      interval = setInterval(() => {
        if (window.Calendly) { clearInterval(interval); init(); }
      }, 100);
    }
    return () => {
      window.removeEventListener('message', onMessage);
      if (interval) clearInterval(interval);
    };
  }, []);

  return (
    <section className="section booking" id="termin">
      <div className="container">

  );
}

<script type="text/babel">
// ── App Shell ─────────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = {
  "palette": ["#5B8CFF", "#9D6BFF"],
  "hero": "modern",
  "show_marquee": true,
  "accent_intensity": 0.18,
  "grain": true
};

const PALETTES = {
  "Electric Blue":  ["#5B8CFF", "#9D6BFF", "#7DD3FC", "0.70 0.19 245", "0.62 0.22 295", "0.88 0.13 210"],
  "Neon Violet":    ["#A06BFF", "#FF6BC8", "#E2BFFF", "0.66 0.22 295", "0.70 0.22 340", "0.88 0.11 305"],
  "Acid Cyan":      ["#22D3EE", "#5B8CFF", "#A7F3D0", "0.82 0.14 200", "0.70 0.19 245", "0.92 0.10 160"],
  "Sunset Coral":   ["#FF7A5C", "#FFB86B", "#FFE08A", "0.74 0.16 35",  "0.80 0.14 70",  "0.92 0.10 90"],
  "Forest Mint":    ["#5BE0A8", "#7DF0C0", "#A7F3D0", "0.78 0.14 160", "0.84 0.12 165", "0.92 0.08 155"],
};

function applyPalette(name) {
  const p = PALETTES[name] || PALETTES["Electric Blue"];
  const r = document.documentElement.style;
  r.setProperty('--accent', `oklch(${p[3]})`);
  r.setProperty('--accent-2', `oklch(${p[4]})`);
  r.setProperty('--accent-3', `oklch(${p[5]})`);
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  useReveal();

  const paletteNames = Object.keys(PALETTES);
  const currentPaletteName = useMemo(() => {
    const match = paletteNames.find((k) => PALETTES[k][0].toLowerCase() === (t.palette?.[0] || "").toLowerCase());
    return match || "Electric Blue";
  }, [t.palette]);

  useEffect(() => { applyPalette(currentPaletteName); }, [currentPaletteName]);
  useEffect(() => {
    document.documentElement.style.setProperty('--line', `oklch(1 0 0 / ${0.06 + t.accent_intensity * 0.2})`);
  }, [t.accent_intensity]);

  return (
    <>
      {t.grain && <div className="grain" aria-hidden="true"></div>}
      <Nav/>
      <Hero variant={t.hero}/>
      <Trust/>
      <Services/>
      <About/>
      <Booking/>
      <Contact/>
      <FinalCTA/>
      <Footer/>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Hero">
          <TweakRadio
            label="Headline"
            value={t.hero}
            onChange={(v) => setTweak('hero', v)}
            options={[
              { value: 'modern', label: 'Modern' },
              { value: 'wirkung', label: 'Wirkung' },
              { value: 'premium', label: 'Premium' },
            ]}
          />
          <TweakToggle label="Marquee" value={t.show_marquee} onChange={(v) => setTweak('show_marquee', v)}/>
        </TweakSection>
        <TweakSection title="Aesthetic">
          <TweakColor
            label="Palette"
            value={t.palette}
            onChange={(v) => setTweak('palette', v)}
            options={[
              PALETTES["Electric Blue"].slice(0,3),
              PALETTES["Neon Violet"].slice(0,3),
              PALETTES["Acid Cyan"].slice(0,3),
              PALETTES["Sunset Coral"].slice(0,3),
              PALETTES["Forest Mint"].slice(0,3),
            ]}
          />
          <TweakSlider label="Border glow" value={t.accent_intensity} onChange={(v) => setTweak('accent_intensity', v)} min={0} max={1} step={0.05}/>
          <TweakToggle label="Film grain" value={t.grain} onChange={(v) => setTweak('grain', v)}/>
        </TweakSection>
      </TweaksPanel>

      <style>{!t.show_marquee ? `.marquee { display: none; }` : ''}</style>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
